name: Build NeuroRecorder APK

on:
  push:
    branches:
      - ai-recorder-mvp
    paths:
      - "neuro-recorder/**"
      - ".github/workflows/build-neuro-recorder.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        working-directory: neuro-recorder
        run: gradle --no-daemon clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuroRecorder-debug-apk
          path: neuro-recorder/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
